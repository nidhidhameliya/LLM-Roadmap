apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-api
  template:
    metadata:
      labels:
        app: llm-api
    spec:
      containers:
      - name: llm-api
        image: my-fastapi-app:latest
        imagePullPolicy: Never # Use local image for minikube
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: llm-api-service
spec:
  type: ClusterIP
  selector:
    app: llm-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
